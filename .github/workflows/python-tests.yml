# =========================================================
# GateKeeper Continuous Integration Workflow
#
# Purpose:
# Automatically validate the project on every push and PR
# by running pytest inside a clean Ubuntu environment.
#
# Goals:
# - Detect regressions early
# - Validate dependency integrity
# - Ensure environment portability
# - Support stable architectural evolution
#
# Engineering Philosophy:
# From Validation to Intelligence.
# From GateKeeper to Heimdall.
# =========================================================

name: GateKeeper Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest